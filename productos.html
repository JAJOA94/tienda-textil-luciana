<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Productos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="estilos.css">

</head>

<body>

<nav class="navbar navbar-light bg-white shadow">
<div class="container">

<form class="d-flex w-100">
<input id="buscador" class="form-control me-2" placeholder="Buscar...">
</form>

</div>
</nav>

<section class="container my-5">
<div class="row" id="lista-productos">

<div class="col-md-4 producto puffas"><h5>Puffa Negra</h5></div>
<div class="col-md-4 producto blusas"><h5>Blusa Blanca</h5></div>
<div class="col-md-4 producto jeans"><h5>Jeans Azul</h5></div>

</div>
</section>

<script>
// FILTRO POR URL
const params = new URLSearchParams(window.location.search);
const categoria = params.get('categoria');

if (categoria) {
document.querySelectorAll('.producto').forEach(p=>{
p.style.display = p.classList.contains(categoria) ? 'block':'none';
});
}

// BUSCADOR
document.getElementById('buscador').addEventListener('keyup', function(){
let texto = this.value.toLowerCase();

document.querySelectorAll('.producto').forEach(p=>{
p.style.display = p.innerText.toLowerCase().includes(texto) ? 'block':'none';
});
});
</script>

</body>
</html>
